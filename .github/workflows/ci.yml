name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks and real smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-on-failure: true

      - name: Install PostgreSQL binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Real PostgreSQL HTTP/MCP smoke tests
        run: make real-test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker build
        run: |
          docker buildx create --name agent-mail-ci --driver docker-container --use
          docker buildx build \
            --pull \
            --output type=cacheonly \
            --tag agent-mail-server:ci \
            --cache-from type=gha \
            --cache-to type=gha,mode=max,ignore-error=true \
            .
