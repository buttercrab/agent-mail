name: Staging Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy and verify staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require staging configuration
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_AGENT_MAIL_TOKEN: ${{ secrets.STAGING_AGENT_MAIL_TOKEN }}
          STAGING_PUBLIC_IP: ${{ secrets.STAGING_PUBLIC_IP }}
          STAGING_AGENT_MAIL_URL: ${{ vars.STAGING_AGENT_MAIL_URL }}
          STAGING_SERVICE: ${{ vars.STAGING_SERVICE }}
          STAGING_INSTALL_ROOT: ${{ vars.STAGING_INSTALL_ROOT }}
          STAGING_REMOTE_SOURCE: ${{ vars.STAGING_REMOTE_SOURCE }}
          STAGING_PRIVATE_PORT: ${{ vars.STAGING_PRIVATE_PORT }}
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_SSH_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_AGENT_MAIL_TOKEN"
          test -n "$STAGING_PUBLIC_IP"
          test -n "$STAGING_AGENT_MAIL_URL"
          test -n "$STAGING_SERVICE"
          test -n "$STAGING_INSTALL_ROOT"
          test -n "$STAGING_REMOTE_SOURCE"
          test -n "$STAGING_PRIVATE_PORT"
          test "$STAGING_SERVICE" = "agent-mail-server-staging.service"
          test "$STAGING_INSTALL_ROOT" = "/opt/agent-mail-staging"
          test "$STAGING_REMOTE_SOURCE" = "/tmp/agent-mail-staging-src"
          test "$STAGING_PRIVATE_PORT" = "8788"
          test "$STAGING_AGENT_MAIL_URL" = "https://staging.agent-mail.cc"

      - name: Deploy staging over SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SERVICE: ${{ vars.STAGING_SERVICE }}
          STAGING_INSTALL_ROOT: ${{ vars.STAGING_INSTALL_ROOT }}
          STAGING_REMOTE_SOURCE: ${{ vars.STAGING_REMOTE_SOURCE }}
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/agent-mail-staging
          chmod 0600 ~/.ssh/agent-mail-staging
          test "$STAGING_SERVICE" = "agent-mail-server-staging.service"
          test "$STAGING_INSTALL_ROOT" = "/opt/agent-mail-staging"
          test "$STAGING_REMOTE_SOURCE" = "/tmp/agent-mail-staging-src"
          rsync -az --delete --exclude target -e "ssh -i ~/.ssh/agent-mail-staging -o StrictHostKeyChecking=accept-new" ./ "$STAGING_SSH_USER@$STAGING_HOST:$STAGING_REMOTE_SOURCE/"
          printf -v q_service '%q' "$STAGING_SERVICE"
          printf -v q_root '%q' "$STAGING_INSTALL_ROOT"
          printf -v q_source '%q' "$STAGING_REMOTE_SOURCE"
          remote_script='set -euo pipefail
          test "$STAGING_SERVICE" = "agent-mail-server-staging.service"
          test "$STAGING_INSTALL_ROOT" = "/opt/agent-mail-staging"
          test "$STAGING_REMOTE_SOURCE" = "/tmp/agent-mail-staging-src"
          deploy_user="$(id -un)"
          sudo mkdir -p "$STAGING_INSTALL_ROOT/src" "$STAGING_INSTALL_ROOT/bin"
          sudo chmod 0755 "$STAGING_INSTALL_ROOT" "$STAGING_INSTALL_ROOT/src" "$STAGING_INSTALL_ROOT/bin"
          sudo rsync -a --delete "$STAGING_REMOTE_SOURCE/" "$STAGING_INSTALL_ROOT/src/"
          sudo chown -R "$deploy_user:$deploy_user" "$STAGING_INSTALL_ROOT/src"
          cd "$STAGING_INSTALL_ROOT/src"
          cargo build --release -p agent-mail-server
          sudo install -o root -g root -m 0755 target/release/agent-mail-server "$STAGING_INSTALL_ROOT/bin/agent-mail-server"
          sudo systemctl restart "$STAGING_SERVICE"
          sudo systemctl is-active "$STAGING_SERVICE"'
          printf -v q_script '%q' "$remote_script"
          ssh -i ~/.ssh/agent-mail-staging -o StrictHostKeyChecking=accept-new "$STAGING_SSH_USER@$STAGING_HOST" "STAGING_SERVICE=$q_service STAGING_INSTALL_ROOT=$q_root STAGING_REMOTE_SOURCE=$q_source bash -c $q_script"

      - name: Verify staging public MCP edge
        env:
          AGENT_MAIL_TOKEN: ${{ secrets.STAGING_AGENT_MAIL_TOKEN }}
          AGENT_MAIL_URL: ${{ vars.STAGING_AGENT_MAIL_URL }}
          PUBLIC_IP: ${{ secrets.STAGING_PUBLIC_IP }}
          PRIVATE_PORT: ${{ vars.STAGING_PRIVATE_PORT }}
          EXPECTED_AGENT_MAIL_HOST: staging.agent-mail.cc
          EXPECTED_ENVIRONMENT: staging
        run: ./scripts/deployed_mcp_smoke.sh
