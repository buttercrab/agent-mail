name: Staging Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy and verify staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require staging configuration
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_AGENT_MAIL_TOKEN: ${{ secrets.STAGING_AGENT_MAIL_TOKEN }}
          STAGING_PUBLIC_IP: ${{ secrets.STAGING_PUBLIC_IP }}
          STAGING_AGENT_MAIL_URL: ${{ vars.STAGING_AGENT_MAIL_URL }}
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_SSH_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_AGENT_MAIL_TOKEN"
          test -n "$STAGING_PUBLIC_IP"
          test -n "$STAGING_AGENT_MAIL_URL"

      - name: Deploy staging over SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/agent-mail-staging
          chmod 0600 ~/.ssh/agent-mail-staging
          rsync -az --delete --exclude target -e "ssh -i ~/.ssh/agent-mail-staging -o StrictHostKeyChecking=accept-new" ./ "$STAGING_SSH_USER@$STAGING_HOST:/tmp/agent-mail-src/"
          ssh -i ~/.ssh/agent-mail-staging -o StrictHostKeyChecking=accept-new "$STAGING_SSH_USER@$STAGING_HOST" '
            set -euo pipefail
            sudo mkdir -p /opt/agent-mail/src /opt/agent-mail/bin
            sudo rsync -a --delete /tmp/agent-mail-src/ /opt/agent-mail/src/
            cd /opt/agent-mail/src
            cargo build --release -p agent-mail-server
            sudo install -m 0755 target/release/agent-mail-server /opt/agent-mail/bin/agent-mail-server
            sudo systemctl restart agent-mail-server.service
            sudo systemctl is-active agent-mail-server.service
          '

      - name: Verify staging public MCP edge
        env:
          AGENT_MAIL_TOKEN: ${{ secrets.STAGING_AGENT_MAIL_TOKEN }}
          AGENT_MAIL_URL: ${{ vars.STAGING_AGENT_MAIL_URL }}
          PUBLIC_IP: ${{ secrets.STAGING_PUBLIC_IP }}
        run: ./scripts/deployed_mcp_smoke.sh
