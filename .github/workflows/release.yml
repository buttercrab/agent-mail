name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          install -d dist
          cp target/release/agent-mail-server dist/agent-mail-server-linux-x86_64
          (cd dist && shasum -a 256 agent-mail-server-linux-x86_64 > SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/agent-mail-server-linux-x86_64
            dist/SHA256SUMS
