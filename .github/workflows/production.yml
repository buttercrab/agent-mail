name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or commit to deploy
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy and verify production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-on-failure: true

      - name: Set Rust cache environment
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=2G" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release

      - name: Require production configuration
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_AGENT_MAIL_TOKEN: ${{ secrets.PROD_AGENT_MAIL_TOKEN }}
          PROD_PUBLIC_IP: ${{ secrets.PROD_PUBLIC_IP }}
        run: |
          test -n "$PROD_HOST"
          test -n "$PROD_SSH_USER"
          test -n "$PROD_SSH_KEY"
          test -n "$PROD_AGENT_MAIL_TOKEN"
          test -n "$PROD_PUBLIC_IP"

      - name: Deploy production over SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/agent-mail-production
          chmod 0600 ~/.ssh/agent-mail-production
          ssh -i ~/.ssh/agent-mail-production -o StrictHostKeyChecking=accept-new "$PROD_SSH_USER@$PROD_HOST" "mkdir -p /tmp/agent-mail-src"
          rsync -az -e "ssh -i ~/.ssh/agent-mail-production -o StrictHostKeyChecking=accept-new" target/release/agent-mail-server "$PROD_SSH_USER@$PROD_HOST:/tmp/agent-mail-src/agent-mail-server"
          ssh -i ~/.ssh/agent-mail-production -o StrictHostKeyChecking=accept-new "$PROD_SSH_USER@$PROD_HOST" '
            set -euo pipefail
            test -s /tmp/agent-mail-src/agent-mail-server
            sudo mkdir -p /opt/agent-mail/bin
            sudo install -o root -g root -m 0755 /tmp/agent-mail-src/agent-mail-server /opt/agent-mail/bin/agent-mail-server
            sudo systemctl restart agent-mail-server.service
            sudo systemctl is-active agent-mail-server.service
          '

      - name: Verify production public MCP edge
        env:
          AGENT_MAIL_TOKEN: ${{ secrets.PROD_AGENT_MAIL_TOKEN }}
          AGENT_MAIL_URL: https://agent-mail.cc
          PUBLIC_IP: ${{ secrets.PROD_PUBLIC_IP }}
          EXPECTED_AGENT_MAIL_HOST: agent-mail.cc
          EXPECTED_ENVIRONMENT: production
        run: ./scripts/deployed_mcp_smoke.sh
